<!doctype html>
<html>
<head>
<meta charset='utf-8'/>
<title>CSChat</title>
<style>
	:root { --bg:#111; --fg:#eee; }
	html, body { height: 100%; margin: 0; overflow: hidden; }
	body { display: grid; grid-template-rows: auto 1fr auto; }
	#main { display:flex; flex-direction:column; min-height:0; }
	#console { display:flex; flex-direction:column; align-items:flex-start; gap:10px; flex:1; min-height:0; overflow:auto; padding:12px; }
	#composer { display:flex; gap:8px; padding:8px 12px; border-top:none; background:transparent; }
	#t{ flex:1; font:inherit; padding:10px 14px; border:1px solid #d9d9d9; border-radius:9999px; outline:none; background:#fff; box-shadow: inset 0 1px 2px rgba(0,0,0,.06); }
	#t:focus{ border-color:#b9cdfd; box-shadow:0 0 0 2px rgba(80,140,255,.15), inset 0 1px 2px rgba(0,0,0,.06); }
	#send{ padding:8px 14px; border:1px solid #d9d9d9; border-radius:9999px; background:#f6f6f6; font:inherit; cursor:pointer;}
	#send:hover{background:#f0f0f0;} #send:active{background:#eaeaea;}
	pre{margin:0 0 8px 0; white-space:pre-wrap;}
	
	/* message bubbles */
	#console>.bubble{ white-space:normal; margin:0; padding:10px 12px; border-radius:10px; line-height:1.35; word-break:break-word; background:#1b1b1b; border:1px solid #333; color:var(--fg); max-width:min(90ch,85%); align-self:flex-start; font-family:system-ui,sans-serif; }
	#console .bubble>:first-child{margin-top:0;} #console .bubble>:last-child{margin-bottom:0;}
	#console>.bubble.user{ align-self:flex-end; background:#1d80ea; border-color:#1d80ea; color:#fafafa;}
	#console>.bubble.assistant{ background:#eee; border-color:#eee; color:#000;}
	#console>.bubble.system{ align-self:stretch; width: auto; text-align: left; max-width:100%; background:#ddd; border-style:dashed; color:#000;}

	/* tool bubbles scroll horizontally if they must, but prefer wrapping first */
	#console>.bubble.tool { color: #000; --pad-top: 10px; padding:var(--pad-top) 12px 10px 12px; align-self: stretch; width: auto; max-width: 100%; box-sizing: border-box; text-align: left; background: #eee; border-color: #eee; font-weight: 500; overflow-wrap: anywhere; max-height: 65vh; min-height: 220px; overflow: auto; overflow-x: auto; }
	#console .bubble.tool h1,
	#console .bubble.tool h2,
	#console .bubble.tool h3,
	#console .bubble.tool h4,
	#console .bubble.tool h5,
	#console .bubble.tool h6 { color:#000; }

	/* tables: fixed layout + wrapping cells = stable widths */
	#console .bubble.tool table { width: 100%; border-collapse: collapse; table-layout: fixed; font-weight: normal; }

	/* cells: wrap, don't clip; let URLs break nicely */
	#console .bubble.tool th,
	#console .bubble.tool td { border: 1px solid #333; padding: 6px 8px; text-align: left; vertical-align: top; white-space: normal; overflow-wrap: anywhere; word-break: break-word; hyphens: auto; color:#000;}
	
	/* lighter, clearer stripes and header */
	#console .bubble.tool th { background: #ddd; }
	#console .bubble.tool tr:nth-child(even) td { background: #f5f5f5; color:#000; }

	/* sticky header for tall tables */
	#console .bubble.tool thead th { position: sticky; top: calc(-1 * var(--pad-top)); z-index: 2; background: #ddd; box-shadow: 0 1px 0 #333 inset; }
</style>
</head>
<body>
	<header></header>
	<div id='main'>
		<div id='console'></div>
	</div>
	<div id='composer' style='display:none;'>
		<input id='t' type='text' placeholder='Type a message...'/>
		<button id='send'>Send</button>
	</div>
<script src="marked.min.js"></script>
<script>
	const consoleEl = document.getElementById('console');
	const t = document.getElementById('t');
	const send = document.getElementById('send');

	function debugLog(msg) {
		const text = (typeof msg === 'string') ? msg : JSON.stringify(msg);
		// forward to host for logging
		try { window.external.sendMessage(JSON.stringify({ type: 'Debug', message: text })); } catch {}
	}
	
	// --- UiNode Control Surface ---
	let controlRoot = null;
	const controlNodes = new Map(); // key -> DOM element mapping
	
	// Rest of the script first, then initialize at the very end after all functions are defined
	
	function initializeApp() {
		// Inspect bridge objects so we know what the host exposed
		try {
			const ext = window.external;
			debugLog(`external: ${ext ? 'present' : 'missing'}`);
			if (ext) {
				debugLog(`external.sendMessage: ${typeof ext.sendMessage}`);
				debugLog(`external.receiveMessage (before bind): ${typeof ext.receiveMessage}`);
			}
			if (window.chrome && window.chrome.webview) {
				debugLog('chrome.webview: present');
			}
		} catch (e) { debugLog('inspect external failed: ' + e.message); }
		// CRITICAL: Photino.NET on Windows uses WebView2, which means we should use
		// window.chrome.webview.addEventListener instead of window.external.receiveMessage
		if (window.chrome && window.chrome.webview) {
			window.chrome.webview.addEventListener('message', (event) => {
				handle(event.data);
			});
		} else {
			// Fallback for non-WebView2 platforms
			function registerReceive() {
				try {
					if (window.external && typeof window.external.receiveMessage === 'function') {
						// Photino API: call receiveMessage(callback) to register
						window.external.receiveMessage((message) => {
							handle(message);
						});
						debugLog('registered external.receiveMessage callback');
					}
				} catch (e) { debugLog('register receive failed: ' + e.message); }
			}
			registerReceive();

			// Also listen for Photino's custom and generic channels just in case
			try {
				window.addEventListener('webMessageReceived', (e) => {
					handle(e.detail ?? e.data ?? e);
				});
				window.addEventListener('WebMessageReceived', (e) => {
					handle(e.detail ?? e.data ?? e);
				});
				window.addEventListener('webMessage', (e) => {
					handle(e.detail ?? e.data ?? e);
				});
				window.addEventListener('message', (e) => {
					// Avoid echoing our own post() which goes to host; this is for host->JS
					handle(e.data ?? e.detail ?? e);
				});
				document.addEventListener('message', (e) => {
					handle(e.data ?? e.detail ?? e);
				});
			} catch (e) { debugLog('bind extra listeners failed: ' + e.message); }
		}
		
		// Initialize root container
		initializeRootContainer();
		
		// Initial ping → enables .NET flush
		const ping = () => {
			post({ type:'Resize', width: Math.floor(window.innerWidth/8), height: Math.floor(window.innerHeight/18) });
		};
		new ResizeObserver(ping).observe(document.body);
		ping();

		// Optional: keep-alive ping so we can see JS->host is alive while waiting for host->JS
		setTimeout(() => debugLog('JS ready; awaiting host messages...'), 250);

		t.focus();
	}

	// this is known to work all the time, everywhere -- do not modify/replace this implementation
	function post(obj) { try { window.external.sendMessage(JSON.stringify(obj)); } catch (e) { console.error('post failed:', e); } }

	// Open all links in the system browser instead of navigating inside Photino
	document.addEventListener('click', (e) => {
		if (e.target.tagName === 'A' && e.target.href) {
			e.preventDefault();
			post({ type: 'OpenExternal', url: e.target.href });
		}
	});

	// also catch middle-clicks (auxclick) so they don't navigate inside
	document.addEventListener('auxclick', (e) => {
		if (e.target.tagName === 'A' && e.target.href) {
			e.preventDefault();
			post({ type: 'OpenExternal', url: e.target.href });
		}
	});

	// Unified handler
	function handle(raw) {
		try {
			const kind = typeof raw;
			const msg = (kind === 'string') ? JSON.parse(raw) : (raw && raw.detail ? raw.detail : raw);
			const type = msg.type;
			
			switch (type) {
				case 'ConsoleWrite':
					consoleEl.textContent += (msg.text || '');
					consoleEl.scrollTop = consoleEl.scrollHeight;
					break;
					
				case 'ConsoleWriteLine':
					consoleEl.textContent += (msg.text || '') + '\n';
					consoleEl.scrollTop = consoleEl.scrollHeight;
					break;
					
				case 'Clear':
					consoleEl.innerHTML = '';
					break;
					
				case 'AddBubble':
					add(msg.kind, msg.text);
					break;
					
				case 'MountControl':
					mountControl(msg.tree, msg.options);
					break;
					
				case 'PatchControl':
					patchControl(msg.patch);
					break;
					
				case 'FocusControl':
					focusControl(msg.key);
					break;
			}
		} catch (e) {
			debugLog('Message handling error: ' + e.message);
		}
	}
	
	function add(kind, text) {
		const bubble = document.createElement('div');
		bubble.className = 'bubble ' + kind;
		if (typeof marked !== 'undefined') {
			bubble.innerHTML = marked.parse(text || '');
		} else {
			bubble.textContent = text || '';
		}
		consoleEl.appendChild(bubble);
		consoleEl.scrollTop = consoleEl.scrollHeight;
	}

	function submit() {
		const text = t.value.trim();
		if (text) {
			post({ type: 'Input', text });
			t.value = '';
		}
	}

	send.onclick = submit;

	t.addEventListener('keydown', (e) => {
		if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
		else post({ type:'Key', key:e.key, char:e.key.length===1? e.key : '', shift:e.shiftKey, ctrl:e.ctrlKey, alt:e.altKey });
	});

	document.addEventListener('keydown', (e) => {
		if (document.activeElement !== t)
			post({ type:'Key', key:e.key, char:e.key.length===1? e.key : '', shift:e.shiftKey, ctrl:e.ctrlKey, alt:e.altKey });
	});

	// Initialize root container for patch-based rendering
	// Creates a minimal frame.root that will be replaced by the first ReplaceOp from PostSetRootAsync
	function initializeRootContainer() {
		debugLog('initializeRootContainer()');
		// Clear existing content
		consoleEl.innerHTML = '';
		controlNodes.clear();

		// Create minimal frame.root container (will be replaced by first patch)
		const frameRoot = document.createElement('div');
		frameRoot.setAttribute('data-key', 'frame.root');
		frameRoot.id = 'frame.root';
		frameRoot.className = 'frame-root';
		frameRoot.style.display = 'flex';
		frameRoot.style.flexDirection = 'column';
		frameRoot.style.height = '100%';
		frameRoot.style.width = '100%';

		consoleEl.appendChild(frameRoot);
		controlNodes.set('frame.root', frameRoot);

		// Send a message to C# to trigger _ready=true
		post({ type: 'Ready', message: 'UI initialized' });
		debugLog('Sent Ready -> host');
	}

	function mountControl(tree, options) {
		if (!tree) {
			debugLog('[mountControl] No tree');
			return;
		}
				
		// Clear existing control surface
		consoleEl.innerHTML = '';
		controlNodes.clear();
		
		// Render new tree
		controlRoot = renderNode(tree);
		if (controlRoot) {
			consoleEl.appendChild(controlRoot);
		} else {
			debugLog('[mountControl] renderNode returned null in mountControl!');
		}
		
		// Set initial focus if specified
		if (options && options.InitialFocusKey) {
			setTimeout(() => focusControl(options.InitialFocusKey), 50);
		}
	}

	function renderNode(node) {
		if (!node) {
			debugLog('[renderNode] NULL node');
			return null;
		}
		
		const kind = node.kind;
		const props = node.props || {};
		const styles = node.styles || {};
		const children = node.children || [];
		
		let element = null;
		
		switch (kind) {
			case 'Column':
				element = document.createElement('div');
				element.style.display = 'flex';
				element.style.flexDirection = 'column';
				element.style.gap = '8px';
				applyLayoutProps(element, props);
				break;
				
			case 'Row':
				element = document.createElement('div');
				element.style.display = 'flex';
				element.style.flexDirection = 'row';
				element.style.gap = '8px';
				element.style.alignItems = 'center';
				applyLayoutProps(element, props);
				break;
				
			case 'Label':
				element = document.createElement('div');
				element.textContent = props.Text || '';
				applyTextStyles(element, styles);
				break;
				
			case 'Button':
				element = document.createElement('button');
				element.textContent = props.Text || '';
				element.disabled = props.Enabled === false;
				element.style.padding = '8px 16px';
				element.style.border = '1px solid #ccc';
				element.style.borderRadius = '4px';
				element.style.cursor = props.Enabled === false ? 'not-allowed' : 'pointer';
				element.style.background = '#f0f0f0';
				
				if (props.OnClick) {
					element.addEventListener('click', () => {
						post({ type: 'ControlEvent', key: node.key, name: 'click', value: null });
					});
				}
				break;
				
			case 'TextBox':
				element = document.createElement('input');
				element.type = 'text';
				element.value = props.Text || '';
				element.placeholder = props.Placeholder || '';
				element.style.padding = '8px';
				element.style.border = '1px solid #ccc';
				element.style.borderRadius = '4px';
				element.style.flex = '1';
				
				element.addEventListener('input', (e) => {
					post({ type: 'ControlEvent', key: node.key, name: 'change', value: e.target.value });
				});
				
				element.addEventListener('keydown', (e) => {
					if (e.key === 'Enter') {
						post({ type: 'ControlEvent', key: node.key, name: 'enter', value: e.target.value });
					}
				});
				break;
				
			case 'TextArea':
				element = document.createElement('textarea');
				element.value = props.Text || '';
				element.placeholder = props.Placeholder || '';
				element.style.padding = '8px';
				element.style.border = '1px solid #ccc';
				element.style.borderRadius = '4px';
				element.style.minHeight = '100px';
				element.style.resize = 'vertical';
				element.style.flex = '1';
				
				element.addEventListener('input', (e) => {
					post({ type: 'ControlEvent', key: node.key, name: 'change', value: e.target.value });
				});
				break;
				
			case 'CheckBox':
			case 'Toggle':
				element = document.createElement('label');
				element.style.display = 'flex';
				element.style.alignItems = 'center';
				element.style.gap = '8px';
				element.style.cursor = 'pointer';
				
				const checkbox = document.createElement('input');
				checkbox.type = 'checkbox';
				checkbox.checked = props.Checked || false;
				
				checkbox.addEventListener('change', (e) => {
					post({ type: 'ControlEvent', key: node.key, name: 'toggle', value: e.target.checked });
				});
				
				const label = document.createElement('span');
				label.textContent = props.Label || '';
				
				element.appendChild(checkbox);
				element.appendChild(label);
				break;
				
			case 'ListView':
				element = document.createElement('div');
				element.style.border = '1px solid #ccc';
				element.style.borderRadius = '4px';
				element.style.maxHeight = '300px';
				element.style.overflowY = 'auto';
				
				const items = props.Items || [];
				const selectedIndex = props.SelectedIndex || 0;
				
				items.forEach((item, index) => {
					const itemEl = document.createElement('div');
					itemEl.textContent = item;
					itemEl.style.padding = '8px 12px';
					itemEl.style.cursor = 'pointer';
					itemEl.style.borderBottom = '1px solid #eee';
					
					if (index === selectedIndex) {
						itemEl.style.background = '#e3f2fd';
						itemEl.style.fontWeight = 'bold';
					}
					
					itemEl.addEventListener('click', () => {
						post({ type: 'ControlEvent', key: node.key, name: 'itemActivated', value: item });
					});
					
					itemEl.addEventListener('mouseenter', () => {
						if (index !== selectedIndex) {
							itemEl.style.background = '#f5f5f5';
						}
					});
					
					itemEl.addEventListener('mouseleave', () => {
						if (index !== selectedIndex) {
							itemEl.style.background = '';
						}
					});
					
					element.appendChild(itemEl);
				});
				break;
				
			case 'Html':
				element = document.createElement('div');
				const content = props.Content || '';
				
				// Check if content is markdown or HTML
				if (typeof marked !== 'undefined' && !content.trim().startsWith('<')) {
					// Parse as markdown
					element.innerHTML = marked.parse(content);
				} else {
					// Render as HTML
					element.innerHTML = content;
				}
				element.classList.add('bubble', 'tool');
				break;
				
			case 'Spacer':
				element = document.createElement('div');
				const height = props.Height || 1;
				element.style.height = (height * 8) + 'px';
				break;
				
			case 'Accordion':
				element = document.createElement('details');
				element.open = props.Expanded || false;
				
				const summary = document.createElement('summary');
				summary.textContent = props.Title || 'Accordion';
				summary.style.cursor = 'pointer';
				summary.style.padding = '8px';
				summary.style.fontWeight = 'bold';
				element.appendChild(summary);
				
				const contentDiv = document.createElement('div');
				contentDiv.style.padding = '8px';
				element.appendChild(contentDiv);
				
				// Store reference for children
				element._contentContainer = contentDiv;
				break;
				
			case 'Progress':
				element = renderProgressNode(node, props);
				break;
				
			default:
				console.warn('Unknown UiKind:', kind);
				element = document.createElement('div');
				element.textContent = `[Unknown: ${kind}]`;
				break;
		}
		
		if (!element) return null;
		
		// Store node key for patching
		element.dataset.nodeKey = node.key;
		controlNodes.set(node.key, element);
		
		// Apply common properties
		if (props.Width) element.style.width = props.Width;
		if (props.Height && kind !== 'Spacer') element.style.height = props.Height;
		if (props.Padding) element.style.padding = props.Padding;
		if (props.Modal) {
			element.style.position = 'fixed';
			element.style.top = '50%';
			element.style.left = '50%';
			element.style.transform = 'translate(-50%, -50%)';
			element.style.background = 'white';
			element.style.padding = '24px';
			element.style.borderRadius = '8px';
			element.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
			element.style.zIndex = '1000';
		}
		
		if (props.Scrollable || props.AutoScroll) {
			element.style.overflowY = 'auto';
			if (props.AutoScroll) {
				element.dataset.autoScroll = 'true';
			}
		}
		
		// Apply layout-specific properties
		if (props.Layout === 'dock-bottom') {
			element.style.display = 'flex';
			element.style.flexDirection = 'column';
			element.style.height = '100%';
			
			// Find the messages panel child and make it scrollable
			if (children.length > 0) {
				const firstChildKey = children[0].key;
				setTimeout(() => {
					const firstChild = controlNodes.get(firstChildKey);
					if (firstChild) {
						firstChild.style.flex = '1';
						firstChild.style.overflowY = 'auto';
						firstChild.style.minHeight = '0';
					}
				}, 0);
			}
		}
		
		// Render children
		const container = element._contentContainer || element;
		children.forEach(child => {
			const childElement = renderNode(child);
			if (childElement) {
				container.appendChild(childElement);
			}
		});
		
		return element;
	}
	
	function renderProgressNode(node, props) {
		const element = document.createElement('div');
		element.classList.add('bubble', 'tool');
		element.style.padding = '12px';
		element.style.background = '#f9f9f9';
		element.style.border = '1px solid #ddd';
		element.style.borderRadius = '4px';
		
		const title = props.Title || 'Progress';
		const items = props.ProgressItems || [];
		const stats = props.ProgressStats || [0, 0, 0, 0, 0];
		const etaHint = props.EtaHint || null;
		const isActive = props.IsActive !== false;
		const cancellable = props.Cancellable || false;
		
		// Title
		const titleEl = document.createElement('h3');
		titleEl.textContent = title;
		titleEl.style.marginTop = '0';
		element.appendChild(titleEl);
		
		// Stats line
		const statsEl = document.createElement('div');
		statsEl.textContent = `Running: ${stats[0]}, Queued: ${stats[1]}, Completed: ${stats[2]}, Failed: ${stats[3]}, Canceled: ${stats[4]}`;
		statsEl.style.fontSize = '0.9em';
		statsEl.style.color = '#666';
		statsEl.style.marginBottom = '8px';
		element.appendChild(statsEl);
		
		// ETA hint
		if (etaHint) {
			const etaEl = document.createElement('div');
			etaEl.textContent = `ETA: ${etaHint}`;
			etaEl.style.fontSize = '0.9em';
			etaEl.style.color = '#666';
			etaEl.style.marginBottom = '8px';
			element.appendChild(etaEl);
		}
		
		// Progress items (show only active work)
		const activeItems = items.filter(item => {
			const state = item[2]; // ProgressState enum value
			return state !== 'Completed' && state !== 'Canceled';
		});
		
		if (activeItems.length > 0) {
			const listEl = document.createElement('div');
			listEl.style.marginTop = '12px';
			
			activeItems.forEach(item => {
				const [name, percent, state, note, steps] = item;
				const itemEl = document.createElement('div');
				itemEl.style.marginBottom = '8px';
				itemEl.style.padding = '8px';
				itemEl.style.background = '#fff';
				itemEl.style.border = '1px solid #e0e0e0';
				itemEl.style.borderRadius = '4px';
				
				// Item name and state
				const headerEl = document.createElement('div');
				headerEl.style.display = 'flex';
				headerEl.style.justifyContent = 'space-between';
				headerEl.style.marginBottom = '4px';
				
				const nameEl = document.createElement('span');
				nameEl.textContent = name;
				nameEl.style.fontWeight = 'bold';
				
				const stateEl = document.createElement('span');
				stateEl.textContent = state;
				stateEl.style.fontSize = '0.85em';
				stateEl.style.color = state === 'Running' ? '#2196f3' : state === 'Failed' ? '#f44336' : '#666';
				
				headerEl.appendChild(nameEl);
				headerEl.appendChild(stateEl);
				itemEl.appendChild(headerEl);
				
				// Progress bar
				const progressBarBg = document.createElement('div');
				progressBarBg.style.width = '100%';
				progressBarBg.style.height = '8px';
				progressBarBg.style.background = '#e0e0e0';
				progressBarBg.style.borderRadius = '4px';
				progressBarBg.style.overflow = 'hidden';
				
				const progressBarFg = document.createElement('div');
				progressBarFg.style.width = percent + '%';
				progressBarFg.style.height = '100%';
				progressBarFg.style.background = state === 'Running' ? '#2196f3' : state === 'Failed' ? '#f44336' : '#4caf50';
				progressBarFg.style.transition = 'width 0.3s ease';
				
				progressBarBg.appendChild(progressBarFg);
				itemEl.appendChild(progressBarBg);
				
				// Note or steps
				if (note) {
					const noteEl = document.createElement('div');
					noteEl.textContent = note;
					noteEl.style.fontSize = '0.85em';
					noteEl.style.color = '#666';
					noteEl.style.marginTop = '4px';
					itemEl.appendChild(noteEl);
				} else if (steps && steps[1] > 0) {
					const stepsEl = document.createElement('div');
					stepsEl.textContent = `${steps[0]} / ${steps[1]} steps`;
					stepsEl.style.fontSize = '0.85em';
					stepsEl.style.color = '#666';
					stepsEl.style.marginTop = '4px';
					itemEl.appendChild(stepsEl);
				}
				
				listEl.appendChild(itemEl);
			});
			
			element.appendChild(listEl);
		}
		
		// Cancel button
		if (cancellable && isActive) {
			const cancelBtn = document.createElement('button');
			cancelBtn.textContent = 'Cancel (ESC)';
			cancelBtn.style.marginTop = '12px';
			cancelBtn.style.padding = '6px 12px';
			cancelBtn.style.border = '1px solid #ccc';
			cancelBtn.style.borderRadius = '4px';
			cancelBtn.style.background = '#f0f0f0';
			cancelBtn.style.cursor = 'pointer';
			
			cancelBtn.addEventListener('click', () => {
				post({ type: 'CancelProgress', id: node.key.replace('progress-', '') });
			});
			
			element.appendChild(cancelBtn);
		}
		
		return element;
	}
	
	function applyLayoutProps(element, props) {
		if (props.Padding) element.style.padding = props.Padding;
		if (props.Width) element.style.width = props.Width;
		if (props.Height) element.style.height = props.Height;
	}
	
	function applyTextStyles(element, styles) {
		if (styles.ForegroundColor) {
			element.style.color = getConsoleColor(styles.ForegroundColor);
		}
		if (styles.BackgroundColor) {
			element.style.background = getConsoleColor(styles.BackgroundColor);
		}
		if (styles.Bold) {
			element.style.fontWeight = 'bold';
		}
		if (styles.Align) {
			element.style.textAlign = styles.Align;
		}
		if (styles.Wrap === false) {
			element.style.whiteSpace = 'nowrap';
			element.style.overflow = 'hidden';
			element.style.textOverflow = 'ellipsis';
		}
	}

	function patchControl(patch) {
		if (!patch || !patch.ops) 
		{
			debugLog(`[PatchControl] patch or patch.ops is null`);
			return;
		}
		
		patch.ops.forEach(op => {
			try {
				switch (op.type) {
					case 'replace':
						replaceNode(op.key, op.node);
						break;
					case 'updateProps':
						updateNodeProps(op.key, op.props);
						break;
					case 'insertChild':
						insertChild(op.parentKey, op.index, op.node);
						break;
					case 'remove':
						removeNode(op.key);
						break;
				}
			} catch (e) {
				debugLog(`[PatchControl] Error applying op: ${JSON.stringify(op)} - ${e.message}`);
			}
		});
	}

	function replaceNode(key, newNode) {
		const oldEl = controlNodes.get(key);
		if (!oldEl) {
			debugLog(`replaceNode: ${key} not found`);
			return;
		}
		const newEl = renderNode(newNode);
		if (newEl && oldEl.parentNode) {
			oldEl.parentNode.replaceChild(newEl, oldEl);
			// BUG: controlNodes.delete(key)
			controlNodes.set(key, newEl); // ✅ keep mapping
		}
	}

	function updateNodeProps(key, props) {
		const element = controlNodes.get(key);
		if (!element) {
			debugLog(`updateNodeProps: ${key} not found`);
			return;
		}
		
		// Update properties based on prop keys
		Object.keys(props).forEach(propKey => {
			const value = props[propKey];
			
			switch (propKey) {
				case 'Text':
					if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
						element.value = value || '';
					} else if (element.tagName === 'BUTTON') {
						element.textContent = value || '';
					} else {
						element.textContent = value || '';
					}
					break;
					
				case 'Enabled':
					if (element.tagName === 'BUTTON') {
						element.disabled = !value;
						element.style.cursor = value ? 'pointer' : 'not-allowed';
					}
					break;
					
				case 'Checked':
					const checkbox = element.querySelector('input[type="checkbox"]');
					if (checkbox) {
						checkbox.checked = value || false;
					}
					break;
					
				case 'Placeholder':
					if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
						element.placeholder = value || '';
					}
					break;
					
				case 'Items':
					// For ListView, rebuild the items
					if (element.dataset.nodeKey) {
						const selectedIndex = props.SelectedIndex || 0;
						element.innerHTML = '';
						
						(value || []).forEach((item, index) => {
							const itemEl = document.createElement('div');
							itemEl.textContent = item;
							itemEl.style.padding = '8px 12px';
							itemEl.style.cursor = 'pointer';
							itemEl.style.borderBottom = '1px solid #eee';
							
							if (index === selectedIndex) {
								itemEl.style.background = '#e3f2fd';
								itemEl.style.fontWeight = 'bold';
							}
							
							itemEl.addEventListener('click', () => {
								post({ type: 'ControlEvent', key: key, name: 'itemActivated', value: item });
							});
							
							itemEl.addEventListener('mouseenter', () => {
								if (index !== selectedIndex) {
									itemEl.style.background = '#f5f5f5';
								}
							});
							
							itemEl.addEventListener('mouseleave', () => {
								if (index !== selectedIndex) {
									itemEl.style.background = '';
								}
							});
							
							element.appendChild(itemEl);
						});
					}
					break;
					
				case 'ProgressItems':
				case 'ProgressStats':
				case 'EtaHint':
				case 'IsActive':
					// For progress nodes, we need to re-render the entire node
					// Store the props on the element for now
					if (!element._progressProps) element._progressProps = {};
					element._progressProps[propKey] = value;
					
					// If we have all the props, re-render
					if (element._progressProps.ProgressItems !== undefined) {
						// Find the original node to get the kind
						const parentNode = { key: key, kind: 'Progress', props: element._progressProps || {}, children: [] };
						const newElement = renderProgressNode(parentNode, element._progressProps);
						if (newElement && element.parentNode) {
							element.parentNode.replaceChild(newElement, element);
							controlNodes.set(key, newElement);
						}
					}
					break;
			}
		});
		
		// Auto-scroll if autoScroll property is set
		if (element.dataset.autoScroll === 'true') {
			setTimeout(() => {
				element.scrollTop = element.scrollHeight;
			}, 0);
		}
	}

	function insertChild(parentKey, index, childNode) {
		const parent = controlNodes.get(parentKey);
		if (!parent) {
			debugLog(`insertChild: parent not found ${parentKey}`);
			return;
		}
		
		const container = parent._contentContainer || parent;
		const childElement = renderNode(childNode);
		if (!childElement) {
			debugLog(`[insertChild] renderNode returned null for childNode: ${childNode}`);
			return;
		}
		
		if (index >= container.children.length) {
			container.appendChild(childElement);
		} else {
			container.insertBefore(childElement, container.children[index]);
		}
		
		// Auto-scroll if parent has autoScroll
		if (parent.dataset.autoScroll === 'true') {
			setTimeout(() => {
				parent.scrollTop = parent.scrollHeight;
			}, 0);
		}
	}

	function removeNode(key) {
		const element = controlNodes.get(key);
		if (element && element.parentNode) {
			element.parentNode.removeChild(element);
			controlNodes.delete(key);
		}
	}

	function focusControl(key) {
		const element = controlNodes.get(key);
		if (element && typeof element.focus === 'function') {
			element.focus();
		}
	}

	function getConsoleColor(color) {
		// Map ConsoleColor enum values to CSS colors
		const colorMap = {
			'Black': '#000000',
			'DarkBlue': '#000080',
			'DarkGreen': '#008000',
			'DarkCyan': '#008080',
			'DarkRed': '#800000',
			'DarkMagenta': '#800080',
			'DarkYellow': '#808000',
			'Gray': '#c0c0c0',
			'DarkGray': '#808080',
			'Blue': '#0000ff',
			'Green': '#00ff00',
			'Cyan': '#00ffff',
			'Red': '#ff0000',
			'Magenta': '#ff00ff',
			'Yellow': '#ffff00',
			'White': '#ffffff'
		};
		return colorMap[color] || color;
	}
	
	// Initialize after all functions are defined
	// WebView2 APIs are immediately available in Photino
	initializeApp();
</script>
</body>
</html>
