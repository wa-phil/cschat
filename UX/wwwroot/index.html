<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>CSChat</title>
<style>
:root { --bg:#111; --fg:#eee; }

/* full-bleed canvas for the UiNode control surface */
html, body, #app { height: 100%; margin: 0; }
body { overflow: hidden; background: var(--bg); color: var(--fg); }
#app { display: block; }

/* generic bubbles & tool styling kept for Tool/Report markdown */
.bubble.tool { 
	color:#000; 
	--pad-top:10px; 
	padding:var(--pad-top) 12px 10px; 
	background:#eee; 
	border:1px solid #eee; 
	border-radius:10px;
	box-sizing:border-box; 
	max-height:65vh; 
	min-height:220px;
	overflow:auto; 
	overflow-x:auto; 
}

.bubble.tool table { width:100%; border-collapse:collapse; table-layout:fixed; }
.bubble.tool th, .bubble.tool td {
	border:1px solid #333; 
	padding:6px 8px; 
	text-align:left; 
	vertical-align:top;
	white-space:normal; 
	overflow-wrap:anywhere; 
	word-break:break-word; 
	hyphens:auto; 
	color:#000;
}

.bubble.tool th { background:#ddd; }
.bubble.tool tr:nth-child(even) td { background:#f5f5f5; }
.bubble.tool thead th { position:sticky; top:calc(-1 * var(--pad-top)); z-index:2; background:#ddd; box-shadow:0 1px 0 #333 inset; }

/* dock-bottom layout used by ChatSurface.Create(...) */
.dock-bottom { display:flex; flex-direction:column; height:100%; min-height:0; scrollbar-gutter:stable both-edges; }
.dock-bottom > .first { flex:1; min-height:0; overflow:auto; }

/* overlays container takes over the viewport and centers its children */
[data-node-key="frame.overlays"]{
	position: fixed;
	inset: 0;
	display: flex;
	align-items: center;
	justify-content: center;
	pointer-events: none;     /* let only panels take events */
	z-index: 9999;
}

/* any child of frame.overlays becomes a panel */
[data-node-key="frame.overlays"] > *{
	pointer-events: auto;
	box-sizing: border-box;
	width: min(80vw, 960px);  /* fallback if Width prop isn’t specified */
	max-height: 80vh;
	overflow: hidden;         /* header/footer pinned; body can scroll */
	background: #111;
	border: 1px solid #444;
	border-radius: 8px;
	box-shadow: 0 10px 30px rgba(0,0,0,.6);
	padding: 12px;
}

/* inside an overlay panel, treat the child marked Role=body as the scrollable area */
[data-node-key="frame.overlays"] [data-role="body"]{overflow: auto; min-height: 0;}

.listview .lv-item { color:#ddd; }
.listview .lv-item:hover { background:#111; }

</style>
</head>
<body>
  <!-- Single mount point for UiNode frame -->
  <div id="app"></div>

<script src="marked.min.js"></script>
<script>
  // ----- host bridge helpers -----
  function post(obj){ try { window.external.sendMessage(JSON.stringify(obj)); } catch(e){ console.error('post failed:', e); } }
  function debugLog(msg){ post({ type:'Debug', message: (typeof msg==='string') ? msg : JSON.stringify(msg) }); }

  // Mount target for UiNode control surface
  const rootEl = document.getElementById('app');

  // Open all links externally
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a');
    if (a && a.href) { e.preventDefault(); post({ type:'OpenExternal', url:a.href }); }
  });
  document.addEventListener('auxclick', (e) => {
    const a = e.target.closest('a');
    if (a && a.href) { e.preventDefault(); post({ type:'OpenExternal', url:a.href }); }
  });

  // Key relay for the input router
  document.addEventListener('keydown', (e) => {
    post({ type:'Key', key:e.key, char:e.key.length===1? e.key : '', shift:e.shiftKey, ctrl:e.ctrlKey, alt:e.altKey });
  });

  // ===== UiNode renderer =====
  const controlNodes = new Map(); // key -> HTMLElement

  function focusControl(key){
    const el = controlNodes.get(key);
    if(!el) return;
    const inner = el.querySelector('input, textarea, button, [tabindex]');
    (inner || el).focus();
  }

  // KINDS registry (same behavior as before; trimmed to essentials you use)
  const KINDS = {
    Column:{ tag:'div', init(el){ el.style.display='flex'; el.style.flexDirection='column'; el.style.gap='8px'; } },
    Row:{    tag:'div', init(el){ el.style.display='flex'; el.style.flexDirection='row'; el.style.gap='8px'; el.style.alignItems='center'; } },
    Label:{  tag:'div', init(el,p){ el.textContent=p.Text||''; }, props:{ Text(el,v){ el.textContent=v||''; } } },
    Button:{ tag:'button',
      init(el,p){ el.textContent=p.Text||''; el.disabled=p.Enabled===false;
        el.style.padding='8px 16px'; el.style.border='1px solid #ccc'; el.style.borderRadius='4px';
        el.style.cursor=p.Enabled===false?'not-allowed':'pointer'; el.style.background='#f0f0f0'; },
      props:{ Text(el,v){ el.textContent=v||''; }, Enabled(el,v){ el.disabled=v===false; el.style.cursor=v===false?'not-allowed':'pointer'; } },
      events:{ OnClick(el,key){ el.addEventListener('click',()=>post({ type:'ControlEvent', key, name:'click', value:null })); } }
    },
    TextBox:{ tag:'input',
      init(el,p){ el.type='text'; el.value=p.Text||''; el.placeholder=p.Placeholder||''; el.style.padding='8px'; el.style.border='1px solid #ccc'; el.style.borderRadius='4px'; el.style.flex='1'; },
      props:{ Text(el,v){ if(el.value!==(v||'')) el.value=v||''; }, Placeholder(el,v){ el.placeholder=v||''; } },
      events:{
        OnChange(el,key){ el.addEventListener('input',e=>post({ type:'ControlEvent', key, name:'change', value:e.target.value })); },
        OnEnter(el,key){ el.addEventListener('keydown',e=>{ if(e.key==='Enter') post({ type:'ControlEvent', key, name:'enter', value:el.value }); }); }
      },
      _extraWire(el,key){
        el.addEventListener('input',e=>post({ type:'ControlEvent', key, name:'change', value:e.target.value }));
        el.addEventListener('keydown',e=>{ if(e.key==='Enter') post({ type:'ControlEvent', key, name:'enter', value:el.value }); });
      }
    },
    Html:{ tag:'div',
      init(el,p){ const c=p.Content||''; el.innerHTML=(typeof marked!=='undefined' && !c.trim().startsWith('<')) ? marked.parse(c) : c; el.classList.add('bubble','tool'); },
      props:{ Content(el,v){ if(typeof v==='string'){ el.innerHTML=(typeof marked!=='undefined' && !v.trim().startsWith('<')) ? marked.parse(v) : v; } } }
    },
    Spacer:{ tag:'div', init(el,p){ el.style.height = ((p.Height||1)*8)+'px'; } },
	ListView: { tag: 'div',
      init(el, p){
        el.classList.add('listview');
        el.tabIndex = 0;
        el.style.display = 'flex';
        el.style.flexDirection = 'column';
        el.style.gap = '4px';
        el.style.padding = '4px';
        el.style.border = '1px solid #444';
        el.style.borderRadius = '6px';
        el.style.background = '#000';
        el.style.minHeight = '0';
        // Height prop: interpret as visible rows – fall back to 10
        const rows = Number(p.Height ?? 10);
        const rowH = 24; // px per row
        el.style.maxHeight = Math.max(1, rows) * rowH + 8 + 'px';
        el.style.overflow = 'auto';
  
        // Build items
        renderListItems(el, p);
        // Track selection
        const si = Number.isInteger(p.SelectedIndex) ? p.SelectedIndex : -1;
        setSelected(el, si);
      },
      props: {
        Items(el, v){ renderListItems(el, { ...readProps(el), Items: v }); },
        SelectedIndex(el, v){ setSelected(el, Number(v)); },
        Height(el, v){
          const rows = Number(v ?? 10); const rowH = 24;
          el.style.maxHeight = Math.max(1, rows) * rowH + 8 + 'px';
        },
        Role(el, v){ el.dataset.role = String(v ?? '').toLowerCase(); },
        Placeholder(el, v){ el.dataset.placeholder = v ?? ''; } // optional, used for dropdown
      },
      events: {
        OnItemActivated(el, key){
          el._onActivate = (idx, text) => post({ type:'ControlEvent', key, name:'itemActivated', value:String(idx) });
        }
      }
    }	
  };

  // helpers for ListView
  function readProps(el){
    return {
      Items: el._items || [],
      SelectedIndex: el._selectedIndex ?? -1,
      Height: el._height ?? 10,
    };
  }
  function renderListItems(el, p){
    const items = Array.isArray(p.Items) ? p.Items : [];
    el._items = items;
    el.innerHTML = '';
    items.forEach((raw, idx) => {
      const li = document.createElement('div');
      li.className = 'lv-item';
      li.style.padding = '4px 8px';
      li.style.whiteSpace = 'nowrap';
      li.style.overflow = 'hidden';
      li.style.textOverflow = 'ellipsis';
      li.style.cursor = 'pointer';
      li.textContent = (raw ?? '').toString();  

      li.addEventListener('mouseenter', () => li.style.background = '#111');
      li.addEventListener('mouseleave', () => {
        if (idx !== el._selectedIndex) li.style.background = 'transparent';
      });
      li.addEventListener('click', () => {
        setSelected(el, idx);
      });
      li.addEventListener('dblclick', () => {
        setSelected(el, idx);
        if (typeof el._onActivate === 'function') el._onActivate(idx, li.textContent || '');
      });  

      el.appendChild(li);
    });
    // re-apply selection decoration after rebuild
    setSelected(el, (Number.isInteger(p.SelectedIndex) ? p.SelectedIndex : -1));
  }
  function setSelected(el, idx){
    el._selectedIndex = (Number.isInteger(idx) ? idx : -1);
    [...el.children].forEach((c, i) => {
      c.style.background = (i === el._selectedIndex) ? '#333' : 'transparent';
      c.style.color = (i === el._selectedIndex) ? '#fff' : '#ddd';
    });
  }  

  function applyTextStyles(el, styles){
    if(styles?.ForegroundColor) el.style.color = mapConsoleColor(styles.ForegroundColor);
    if(styles?.BackgroundColor) el.style.background = mapConsoleColor(styles.BackgroundColor);
    if(styles?.Bold) el.style.fontWeight = 'bold';
    if(styles?.Align) el.style.textAlign = styles.Align;
    if(styles?.Wrap === false){ el.style.whiteSpace='nowrap'; el.style.overflow='hidden'; el.style.textOverflow='ellipsis'; }
  }

  function renderNode(node){
    if(!node) return null;
    const { key, kind, props={}, styles={}, children=[] } = node;
    const spec = KINDS[kind] || {};
    let el = spec.create ? spec.create(node) : document.createElement(spec.tag || 'div');
    spec.init && spec.init(el, props, node);
    el.dataset.nodeKey = key; el.dataset.kind = kind; controlNodes.set(key, el);

    // generic props/layout
    if(props.Width) el.style.width = props.Width;
    if(props.Height && kind!=='Spacer') el.style.height = props.Height;
    if(props.Padding) el.style.padding = props.Padding;
    if(props.Scrollable || props.AutoScroll){ el.style.overflowY='auto'; if(props.AutoScroll) el.dataset.autoScroll='true'; }
    if(props.Layout === 'dock-bottom'){ el.classList.add('dock-bottom'); el.style.height='100%'; el.style.minHeight='0'; }
	if(props.Role) el.dataset.role = props.Role.toString().toLowerCase();
	if(props.Width) el.style.width = props.Width;   // already present; overlay CSS keeps a sensible max

    if(props.Role === 'content'){ el.style.flex='1'; el.style.minHeight='0'; }
	
	if (props.Role === 'body' || (kind==='ListView' && el.closest('[data-node-key="frame.overlays"]'))) {
		el.dataset.role = 'body';
		el.style.overflow = 'auto';
	}

    applyTextStyles(el, styles);

    // wire events
    if(spec.events){
      for(const evProp of Object.keys(spec.events)){
        if(props[evProp] !== undefined) spec.events[evProp](el, key);
      }
    }
    if(spec._extraWire) spec._extraWire(el, key);

    // children
    const container = el._contentContainer || el;
    children.forEach((c,i)=>{
      const childEl = renderNode(c);
      if(!childEl) return;
      if(props.Layout==='dock-bottom' && i===0){
        childEl.classList.add('first');
        childEl.style.minHeight='0';
        if(!childEl.style.overflowY) childEl.style.overflowY='auto';
      }
      container.appendChild(childEl);
    });
    return el;
  }

  function replaceNode(key, newNode){
    const oldEl = controlNodes.get(key);
    if(!oldEl) { debugLog(`replaceNode: ${key} not found`); return; }
    const newEl = renderNode(newNode);
    if(newEl && oldEl.parentNode){
      oldEl.parentNode.replaceChild(newEl, oldEl);
      controlNodes.set(key, newEl);
    }
  }

  function updateNodeProps(key, props){
    const el = controlNodes.get(key); if(!el) return;
    const kind = el.dataset.kind; const spec = KINDS[kind] || {};
    for(const k of Object.keys(props)){
      const v = props[k];
      if(spec.props && spec.props[k]) { try { spec.props[k].call(spec, el, v); } catch{} continue; }
      if(k==='Text'){ if(el.tagName==='INPUT' || el.tagName==='TEXTAREA'){ if(el.value!==(v||'')) el.value=v||''; } else el.textContent=v||''; }
      else if(k==='Enabled' && el.tagName==='BUTTON'){ el.disabled=v===false; el.style.cursor=v===false?'not-allowed':'pointer'; }
      else if(k==='Placeholder' && (el.tagName==='INPUT'||el.tagName==='TEXTAREA')){ el.placeholder=v||''; }
      else if(k==='Width'){ el.style.width=v||''; }
      else if(k==='Height' && kind!=='Spacer'){ el.style.height=v||''; }
      else if(k==='Padding'){ el.style.padding=v||''; }
      else if(k==='AutoScroll'){ if(v) el.dataset.autoScroll='true'; else delete el.dataset.autoScroll; }
      else if(k==='Min' && typeof v==='number'){ const fromBottom = Math.max(0, v|0); el.scrollTop = Math.max(0, el.scrollHeight - fromBottom); }
    }
    if(el.dataset.autoScroll==='true'){ setTimeout(()=>{ el.scrollTop = el.scrollHeight; }, 0); }
  }
  function insertChild(parentKey, index, childNode){
    const parent = controlNodes.get(parentKey);
    if(!parent) { debugLog(`insertChild: parent not found ${parentKey}`); return; }
    const container = parent._contentContainer || parent;
    const childEl = renderNode(childNode);
    if(!childEl) return;
    if(index >= container.children.length) container.appendChild(childEl);
    else container.insertBefore(childEl, container.children[index]);
    if(parent.dataset.autoScroll==='true'){ setTimeout(()=>{ parent.scrollTop = parent.scrollHeight; }, 0); }
  }

  function removeNode(key){
    const el = controlNodes.get(key);
    if(el && el.parentNode){ el.parentNode.removeChild(el); controlNodes.delete(key); }
  }

  function patchControl(patch){
    if(!patch || !patch.ops) return;
    for(const op of patch.ops){
      try{
        if(op.type==='replace') replaceNode(op.key, op.node);
        else if(op.type==='updateProps') updateNodeProps(op.key, op.props);
        else if(op.type==='insertChild') insertChild(op.parentKey, op.index, op.node);
        else if(op.type==='remove') removeNode(op.key);
      }catch(e){ debugLog(`[PatchControl] error: ${e.message}`); }
    }
  }

  function mapConsoleColor(c){
    const m = { Black:'#000', DarkBlue:'#000080', DarkGreen:'#008000', DarkCyan:'#008080',
      DarkRed:'#800000', DarkMagenta:'#800080', DarkYellow:'#808000', Gray:'#c0c0c0',
      DarkGray:'#808080', Blue:'#00f', Green:'#0f0', Cyan:'#0ff', Red:'#f00', Magenta:'#f0f', Yellow:'#ff0', White:'#fff' };
    return m[c] || c;
  }

  // Initialize minimal frame container and wire host→JS messages
  function initializeRootContainer(){
    controlNodes.clear();
    rootEl.innerHTML = '';
    const frameRoot = document.createElement('div');
    frameRoot.setAttribute('data-key','frame.root');
    frameRoot.id = 'frame.root';
    frameRoot.style.display='flex';
    frameRoot.style.flexDirection='column';
    frameRoot.style.height='100%';
    frameRoot.style.width='100%';
    rootEl.appendChild(frameRoot);
    controlNodes.set('frame.root', frameRoot);
    post({ type:'Ready', message:'UI initialized' });
  }

  // Host → JS message dispatch
  function handle(raw){
    try{
      const msg = (typeof raw === 'string') ? JSON.parse(raw) : (raw && raw.detail ? raw.detail : raw);
      switch(msg.type){
        case 'PatchControl': patchControl(msg.patch); break;
        case 'FocusControl': focusControl(msg.key); break;
        case 'Clear': rootEl.innerHTML=''; initializeRootContainer(); break;
      }
    }catch(e){ debugLog('handle error: ' + e.message); }
  }

  // Bind WebView2 (Windows) or Photino fallback
  (function wireHostChannel(){
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener('message', (event) => handle(event.data));
    } else {
      try{
        if (window.external && typeof window.external.receiveMessage === 'function') {
          window.external.receiveMessage((message) => handle(message));
        }
        window.addEventListener('webMessageReceived', (e)=>handle(e.detail ?? e.data ?? e));
        window.addEventListener('message', (e)=>handle(e.data ?? e.detail ?? e));
        document.addEventListener('message', (e)=>handle(e.data ?? e.detail ?? e));
      }catch(e){ debugLog('bind listeners failed: ' + e.message); }
    }
  })();

  // initial size ping and mount
  new ResizeObserver(()=> post({ type:'Resize', width: Math.floor(window.innerWidth/8), height: Math.floor(window.innerHeight/18) }))
    .observe(document.body);
  initializeRootContainer();
  debugLog('JS ready; awaiting host messages...');
</script>
</body>
</html>
